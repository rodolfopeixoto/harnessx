id: kimi
name: Kimi
enabled: true
type: cli

command:
  binary: kimi-cli
  check: kimi-cli --version
  fallback_binaries: ["kimi-code", "kimi"]

capabilities:
  text: true
  vision: false
  files: true
  folders: true
  diff: true
  json_output: true
  stream_output: true
  tool_use: true
  mcp: false
  max_context_tokens: 256000

strengths: [code, search, review, planning, codebase_exploration]

models:
  default: kimi-k2-instruct
  cheap: kimi-k2-instruct
  deep: kimi-k2-thinking

execution:
  prompt_mode: arg
  working_directory: project
  timeout_seconds: 900
  max_retries: 1

run:
  args: ["--print", "-p", "{{prompt}}", "--output-format", "text", "--final-message-only"]

output:
  format: text

failure_detection:
  rate_limit: ["rate limit", "too many requests"]
  auth: ["unauthorized", "invalid token", "not authenticated", "login"]
  context_limit: ["context exceeded", "context length"]

cost:
  mode: estimated
  input_token_price_per_1m: 0.60
  output_token_price_per_1m: 2.50

auth:
  login_command: kimi-cli auth login
  doc_url: https://platform.moonshot.cn
