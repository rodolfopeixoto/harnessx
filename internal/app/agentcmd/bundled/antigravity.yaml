id: antigravity
name: Antigravity
enabled: true
type: cli

command:
  binary: antigravity
  check: antigravity --version
  fallback_binaries: ["antigravity-cli", "ag", "gravity"]

capabilities:
  text: true
  vision: true
  files: true
  folders: true
  diff: true
  json_output: true
  stream_output: true
  tool_use: true
  mcp: true
  max_context_tokens: 2000000

strengths: [code, vision, image, search, docs, agent_os, cheap_review]

models:
  default: gemini-3-1-pro
  cheap: gemini-3-flash
  deep: gemini-3-1-pro
  fast: gemini-3-5-flash

execution:
  prompt_mode: arg
  working_directory: project
  timeout_seconds: 900
  max_retries: 1

run:
  args: ["-p", "{{prompt}}", "--skip-trust", "--approval-mode", "yolo"]

output:
  format: text

failure_detection:
  rate_limit: ["quota", "rate limit", "429"]
  auth: ["unauthorized", "permission denied", "Please set an Auth", "not authenticated"]
  context_limit: ["maximum context", "token limit"]
  transient: ["timeout", "internal error"]

cost:
  mode: estimated
  input_token_price_per_1m: 1.50
  output_token_price_per_1m: 10.00

auth:
  env_var: ANTIGRAVITY_API_KEY
  login_command: antigravity auth login
  doc_url: https://antigravity.google/download
