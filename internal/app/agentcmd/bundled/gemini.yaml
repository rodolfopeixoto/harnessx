id: gemini
name: Gemini
enabled: true
type: cli

command:
  binary: gemini
  check: gemini --version

capabilities:
  text: true
  vision: true
  files: true
  folders: true
  diff: false
  json_output: false
  stream_output: true
  tool_use: true
  mcp: true
  max_context_tokens: 1000000

strengths: [code, vision, image, search, docs, cheap_review]

models:
  default: gemini-2.5-pro
  cheap: gemini-2.5-flash
  deep: gemini-2.5-pro

execution:
  prompt_mode: arg
  working_directory: project
  timeout_seconds: 900
  max_retries: 1

run:
  args: ["-p", "{{prompt}}", "--skip-trust", "--approval-mode", "yolo"]

output:
  format: text

failure_detection:
  rate_limit: ["quota", "rate limit", "429"]
  auth: ["unauthorized", "permission denied", "Please set an Auth", "not authenticated"]
  context_limit: ["maximum context", "token limit"]
  transient: ["timeout", "internal error"]

cost:
  mode: estimated
  input_token_price_per_1m: 1.25
  output_token_price_per_1m: 5.0

auth:
  env_var: GEMINI_API_KEY
  login_command: gemini auth login
  doc_url: https://aistudio.google.com/app/apikey
