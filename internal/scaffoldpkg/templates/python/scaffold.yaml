language: python
description: FastAPI app with pytest, ruff, and a Makefile dev loop
tested_against: "python3.11+, fastapi 0.110+, ruff 0.4+, pytest 8+"

required_tools:
  - python3
  - pip3

files:
  - path: app.py
    template: app.py.tmpl
  - path: requirements.txt
    template: requirements.txt
  - path: tests/__init__.py
    template: tests/__init__.py
  - path: tests/test_app.py
    template: tests/test_app.py.tmpl
  - path: ruff.toml
    template: ruff.toml
  - path: pyproject.toml
    template: pyproject.toml.tmpl
  - path: Makefile
    template: Makefile
  - path: .gitignore
    template: .gitignore
  - path: README.md
    template: README.md.tmpl

post_steps:
  - name: venv
    cmd: ["python3", "-m", "venv", ".venv"]
  - name: pip-install
    cmd: [".venv/bin/pip", "install", "-r", "requirements.txt"]

lint_command: ".venv/bin/ruff check ."
test_command: ".venv/bin/pytest -q"
run_command:  ".venv/bin/uvicorn app:app --reload"
