<!doctype html>
<html>
  <head><title>Sign up</title></head>
  <body>
    <form onsubmit="signup()">
      <input class="ui-input" name="email" placeholder="email"/>
      <input class="ui-input" name="password" type="password"/>
      <div class="loading">Creating account…</div>
      <div class="error">Sorry, something went wrong.</div>
      <button class="UiButton" type="submit">Create account</button>
    </form>
  </body>
</html>
