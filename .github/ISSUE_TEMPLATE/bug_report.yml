name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug] <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing! 👍 React to the issue with 👍 / 👎 / 🚀 / 🎉 so the
        community can vote on priority — the maintainers use reaction counts
        when triaging.

  - type: input
    id: version
    attributes:
      label: HarnessX version
      description: Output of `harness version`.
      placeholder: "harness 0.1.0-dev (abc123, built 2026-06-14)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS + arch
      placeholder: "macOS 14.5 arm64 / Ubuntu 22.04 amd64"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps a maintainer can follow to reproduce.
      placeholder: |
        1. `harness init`
        2. `harness …`
        3. observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour (include error + relevant log lines)
      render: shell
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: "`harness doctor --plain` output"
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I ran `harness ci` and the failure is reproducible.
          required: false
        - label: I have read CONTRIBUTING.md.
          required: true
