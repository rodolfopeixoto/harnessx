name: Feature request
description: Propose a new capability, sensor, agent adapter, or skill.
title: "[feature] <short description>"
labels: ["enhancement", "triage", "community-vote"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing! 🚀 The community votes on features via 👍
        reactions on this issue. High-vote, well-scoped proposals graduate
        from `triage` to `accepted` and become available for contribution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain or constraint motivates this?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Be concrete. Reference the spec section (§N) when it applies.
        Mention which phase / package this fits in.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope estimate
      options:
        - "S (≤ 1 day)"
        - "M (1–3 days)"
        - "L (1+ week)"
        - "XL (multi-phase)"
    validations:
      required: true

  - type: checkboxes
    id: ready
    attributes:
      label: Contribution intent
      options:
        - label: I am willing to submit a PR for this.
        - label: I have read CONTRIBUTING.md and the spec sections relevant to this proposal.
          required: true
